<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercedez Braaksma | Morgans Milton</title>
<meta name="description" content="Mercedez Braaksma — Client Service Manager, Morgans Financial Limited, Milton. Connect on LinkedIn or book an appointment.">
<meta property="og:title" content="Mercedez Braaksma | Morgans Milton">
<meta property="og:description" content="Client Service Manager, Morgans Financial Limited. Connect on LinkedIn or book an appointment.">
<style>
  :root{
    --morgans-blue:#004C98;
    --dark-blue:#003974;
    --green:#6EC05D;
    --lime:#BECE3F;
    --aqua:#00AEC5;
    --blue-grey:#207BA9;
    --charcoal:#414141;
    --tint1:#ECF8FE;
    --pale-grey:#DEDFE0;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Omnes','omnes-pro','Segoe UI',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
    background:var(--tint1);
    color:var(--charcoal);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px;
  }
  .card{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 6px 30px rgba(0,57,116,.15);
  }
  .header{
    background:#013974;
    padding:36px 28px 32px;
    text-align:center;
  }
  .logo{
    height:38px;
    margin-bottom:20px;
  }
  .logo-fallback{
    display:none;
    color:#fff;
    font-size:26px;
    font-weight:600;
    letter-spacing:.5px;
    margin-bottom:22px;
  }
  .avatar{
    width:96px;height:96px;
    border-radius:50%;
    background:#fff;
    color:var(--morgans-blue);
    font-size:34px;font-weight:600;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 16px;
    border:3px solid rgba(255,255,255,.35);
    overflow:hidden;
  }
  .avatar img{width:100%;height:100%;object-fit:cover;object-position:50% 18%;}
  h1{color:#fff;font-size:24px;font-weight:600;}
  .role{color:#C7EAFB;font-size:15px;margin-top:6px;line-height:1.4;}
  .body{padding:24px 24px 24px;}
  .btn{
    display:flex;align-items:center;justify-content:center;gap:10px;
    width:100%;
    padding:16px;
    border-radius:12px;
    font-size:16px;font-weight:600;
    text-decoration:none;
    margin-bottom:12px;
    transition:transform .1s ease,box-shadow .1s ease;
  }
  .btn:active{transform:scale(.98);}
  .btn svg{flex:none;}
  .btn-linkedin{
    background:var(--morgans-blue);
    color:#fff;
    box-shadow:0 4px 14px rgba(0,76,152,.35);
    padding:18px;
    font-size:17px;
  }
  .btn-book{
    background:var(--aqua);
    color:#fff;
  }
  .btn-save{
    background:#fff;
    color:var(--morgans-blue);
    border:2px solid var(--morgans-blue);
  }
  .row{display:flex;gap:12px;}
  .row .btn{
    background:var(--tint1);
    color:var(--dark-blue);
    font-size:15px;
    padding:13px;
  }
  .address{
    text-align:center;
    font-size:13px;
    color:var(--charcoal);
    line-height:1.6;
    margin-top:14px;
    padding-top:16px;
    border-top:1px solid var(--pale-grey);
  }
  .address strong{color:var(--dark-blue);}
  .gradient-strip{
    height:8px;
    background:linear-gradient(90deg,var(--lime) 0%,var(--green) 33%,var(--aqua) 66%,var(--blue-grey) 100%);
  }
</style>
</head>
<body>
  <main class="card">
    <div class="header">
      <img class="logo" src="morgans-logo.png" alt="Morgans" onerror="this.style.display='none';document.getElementById('logoFallback').style.display='block';">
      <div class="logo-fallback" id="logoFallback">Morgans</div>
      <div class="avatar" id="avatar">
        <img src="headshot.jpg" alt="Mercedez Braaksma" onerror="this.remove();document.getElementById('avatar').textContent='MB';">
      </div>
      <h1>Mercedez Braaksma</h1>
      <p class="role">Client Service Manager<br>Morgans Financial Limited &mdash; Milton</p>
    </div>
    <div class="body">
      <a class="btn btn-linkedin" href="https://www.linkedin.com/in/mercedez-braaksma-bb55a0271" target="_blank" rel="noopener">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.76 0-5 2.24-5 5v14c0 2.76 2.24 5 5 5h14c2.76 0 5-2.24 5-5v-14c0-2.76-2.24-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.27c-.97 0-1.75-.79-1.75-1.76s.78-1.76 1.75-1.76 1.75.79 1.75 1.76-.78 1.76-1.75 1.76zm13.5 12.27h-3v-5.6c0-3.37-4-3.11-4 0v5.6h-3v-11h3v1.77c1.4-2.59 7-2.78 7 2.47v6.76z"/></svg>
        Connect with me on LinkedIn
      </a>
      <a class="btn btn-book" href="https://morgans.com.au/branch/milton#contact" target="_blank" rel="noopener">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Book an appointment
      </a>
      <a class="btn btn-save" href="mercedez-braaksma.vcf" download="Mercedez Braaksma.vcf">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Save my contact
      </a>
      <div class="row">
        <a class="btn" href="tel:+61494324812">Call</a>
        <a class="btn" href="mailto:mercedez.braaksma@morgans.com.au">Email</a>
      </div>
      <p class="address">
        <strong>Morgans Milton</strong><br>
        Level 4, 40 McDougall St<br>
        Milton QLD 4064, Australia
      </p>
    </div>
    <div class="gradient-strip"></div>
  </main>
</body>
</html>
